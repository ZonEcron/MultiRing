<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Relay WebSocket</title>
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="./style.css" >
    <script src="./script.js" defer></script>
</head>

<body class="w3-padding-large w3-light-grey">

    <div class="w3-card w3-white w3-padding w3-margin-bottom">
        <h3>Conexión al crono</h3>
        <div class="w3-row w3-margin-top">
            <div class="w3-col s10">
                <input class="w3-input w3-border" type="text" id="localUrl" placeholder="IP o dominio:puerto (ws://...)">
            </div>
            <div class="w3-col s2 w3-center">
                <button class="w3-button w3-blue w3-margin-left" id="toggleLocal">Conectar</button>
            </div>
        </div>
        <div class="w3-margin-top">
            <span id="estadoLocal" class="status desconectado">Desconectado</span>
        </div>
    </div>

    <div class="w3-card w3-white w3-padding w3-margin-bottom">
        <h3>Conexión a múltiples rings</h3>
        <label for="baseNube">URL base de la nube:</label>
        <input class="w3-input w3-border" type="text" id="baseNube" placeholder="flowagility.com">
    </div>

    <div class="w3-card w3-white w3-padding">
        <button class="w3-button w3-green w3-margin-bottom" id="addNube">Añadir servidor nube</button>
        <div class="w3-responsive">
            <table class="w3-table w3-bordered w3-striped w3-small" id="nubeLista"></table>
        </div>
    </div>

</body>

</html>
